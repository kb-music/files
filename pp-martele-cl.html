<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>practice-player-v8.3 +Multi-2+G-DRIVE_PDF</title>
<style>
body{font-family:Arial;max-width:1200px;margin:auto;padding:20px;background:#f2f2f2;}
.box{border:1px solid #ccc;border-radius:8px;background:white;padding:15px;margin-bottom:15px;}
.display{display:inline-block;border:1px solid #3399ff;border-radius:7px;padding:6px 12px;font-family:monospace;font-weight:bold;font-size:22px;text-align:center;width:180px;}
#trackName{border:1px solid #3399ff;border-radius:7px;padding:6px 12px;font-family:monospace;font-weight:bold;font-size:22px;text-align:center;margin-top:10px;}
#albumName{border:1px solid #3399ff;border-radius:7px;padding:6px 12px;font-weight:bold;font-size:22px;text-align:center;margin-bottom:10px;background:#3399ff;color:white;}
#albumButtons{display:flex;gap:6px;margin-bottom:10px;}
/* Неактивные кнопки */
#trackVersions .versionButton {
  background: white;
  border: 2px solid #3399ff;
  color: #3399ff;
  font-weight: bold;
  box-shadow: 0 4px 6px rgba(0,0,0,0.25);
  border-radius: 6px;
  cursor: pointer;
  width: 100%;
  min-height: 72px;      /* минимальная высота для двух строк */
  padding: 6px 4px;      /* немного вертикального и горизонтального отступа */
  line-height: 1.2;      /* управление переносом строк */
  white-space: normal;    /* разрешаем перенос строки */
  transition: all 0.2s;
  text-align: center;
}

/* Активная кнопка */
#trackVersions .versionButton.active {
  background: #3399ff;
  color: white;
  border: 2px solid #3399ff;
  box-shadow: none; /* убираем тень */
}
#trackVersions .versionButton.disabled {
  background: #eee;
  color: #666;
  border: 2px solid #ccc;
  box-shadow: none;
  cursor: default;
  pointer-events: none;
}
#playlist div{padding:6px;border-bottom:1px solid #eee;cursor:pointer;}
#playlist div:hover{background:#eef5ff;}
#playlist .current{font-weight:bold;background:rgba(100,200,255,0.25);}
button{width:44px;height:44px;border:none;border-radius:6px;background:#3399ff;color:white;font-size:20px;cursor:pointer;margin:0 3px;box-shadow:0 4px 6px rgba(0,0,0,0.25);}
.sliderRow{margin-top:12px;}
.sliderRow span{display:inline-block;width:70px;}
input[type=range]{width:100%;-webkit-appearance:none;height:8px;border-radius:4px;background:#ccc;outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:#3399ff;cursor:pointer;margin-top:-4px;}
.flexContainer{display:flex;gap:12px;}
#playlist{width:33%;max-height:700px;overflow:auto;}
#pdfContainer{width:67%;height:800px;overflow:auto;border:1px solid #3399ff;border-radius:7px;}
#pdfViewer{width:100%;height:100%;border:none;}

/* --- Waveform styles --- */
#waveformContainer{border:1px solid #3399ff;border-radius:7px;padding:6px;margin-top:10px;}
#waveform{width:100%;height:150px;background:#fff;border-radius:4px;cursor:pointer;}
.loopFillCanvas{position:absolute;top:0;height:150px;background:rgba(255,180,80,0.25);z-index:0;border-radius:4px;}
</style>
</head>
<body>

<div class="box">
<div id="albumName">Album Name: My First Martele stroke</div>

<div id="albumButtons" style="display:flex; gap:6px; margin-top:10px;">

  <a href="..." target="_self" style="flex:1;">
    <button style="width:100%;">TO MAIN PAGE</button>
  </a>

  <button id="toggleVersions" style="flex:1;">VERSIONS</button>

  <a href="..." target="_blank" style="flex:1;">
    <button style="width:100%;">PRINT FULL PDF</button>
  </a>

</div>

<!-- Блок кнопок версий трека -->

<div id="trackVersions" style="display:none; gap:6px; margin-top:10px;">

<div style="flex:1;">
<button class="versionButton" style="width:100%;" data-type="pn" onclick="switchVersion('pn')">Piano Accompaniment</button>
</div>

<div style="flex:1;">
<button class="versionButton" style="width:100%;" data-type="pv1" onclick="switchVersion('pv1')">Piano and <br> Violin First</button>
</div>

<div style="flex:1;">
<button class="versionButton" style="width:100%;" data-type="main" onclick="switchVersion('main')">Piano and <br> Two violins</button>
</div>

<div style="flex:1;">
<button class="versionButton" style="width:100%;" data-type="pv2" onclick="switchVersion('pv2')">Piano and <br> Violin Second</button>
</div>

<div style="flex:1;">
<button class="versionButton" style="width:100%;" data-type="dt" onclick="switchVersion('dt')">Violin First and <br> Violin Second</button>
</div>
</div>

<div id="trackName">No track</div>

<div id="waveformContainer" style="margin-top:10px;">
<canvas id="waveform"></canvas>
</div>

<div style="margin-top:10px; display:flex; align-items:center; gap:6px;">
  <button id="prev">⏮</button>
  <button id="play">▶</button>
  <button id="next">⏭</button>
  <span class="display" id="time">00:00 / 00:00</span>
  <button id="slow">−</button>
  <button id="reset">=</button>
  <button id="fast">+</button>
  <span class="display" id="speedDisplay">Speed: <span id="speedVal">1.00</span></span>
  <button id="loopA">A</button>
  <button id="loopB">B</button>
  <button id="loopC">C</button>
</div>

<div class="sliderRow">
<span>Speed</span>
<input id="speedSlider" type="range" min="0.5" max="1.5" step="0.01" value="1">
</div>

<div class="sliderRow">
<span>Volume</span>
<input id="volume" type="range" min="0" max="1" step="0.01" value="0.5">
</div>

<div class="flexContainer box">
<div id="playlist"></div>
<div id="pdfContainer">
<iframe id="pdfViewer" src="" allowfullscreen></iframe>
</div>
</div>

<audio id="audio"></audio>

<script>
// ===== ELEMENTS =====
const audio = document.getElementById("audio")
const playlist = document.getElementById("playlist")
const trackName = document.getElementById("trackName")
const play = document.getElementById("play")
const prev = document.getElementById("prev")
const next = document.getElementById("next")
const slow = document.getElementById("slow")
const fast = document.getElementById("fast")
const reset = document.getElementById("reset")
const speedSlider = document.getElementById("speedSlider")
const speedVal = document.getElementById("speedVal")
const volume = document.getElementById("volume")
const time = document.getElementById("time")
const pdfViewer = document.getElementById("pdfViewer")
const loopAButton = document.getElementById("loopA")
const loopBButton = document.getElementById("loopB")
const loopCButton = document.getElementById("loopC")

const toggleVersionsBtn = document.getElementById("toggleVersions")
const trackVersionsBlock = document.getElementById("trackVersions")

toggleVersionsBtn.onclick = () => {
  if(trackVersionsBlock.style.display === "none"){
    trackVersionsBlock.style.display = "flex"
    toggleVersionsBtn.textContent = "HIDE VERSIONS"
  } else {
    trackVersionsBlock.style.display = "none"
    toggleVersionsBtn.textContent = "VERSIONS"
  }
}

// ===== WAVEFORM ELEMENTS =====
const canvas = document.getElementById("waveform")
const ctx = canvas.getContext("2d")
canvas.width = 860
canvas.height = 150
let waveform = []
let loopA = null, loopB = null, dragging = null

// ===== TRACK LIST =====
const tracks = [
  {
    name: "5. Quarts",
    id: "Martele-05",
    url: "https://kb-music.github.io/files/Martele_CL-05.mp3",
    pdf: "https://drive.google.com/file/d/1MKnaI95vCPAHtXUGJFVjgYy_zysxFyMR/preview"
  },

  {
    name: "6. Cuckoo",
    id: "Martele-06",
    url: "https://kb-music.github.io/files/Martele-06_CL.mp3",
    pdf: "https://drive.google.com/file/d/1fSI7yhJcKC1FrMDJaRpr05aSsgZ2CY5k/preview"
  },

  {
    name: "7. Two Proudlings",
    id: "Martele-07",
    url: "https://kb-music.github.io/files/Martele-07_CL.mp3",
    pdf: "https://drive.google.com/file/d/1NJDLhJzdUwiIkVbcQ3A2PmI0NBEb0Ptl/preview"
  },

  {
    name: "8. The Hunter",
    id: "Martele-08",
    url: "https://kb-music.github.io/files/Martele-08_CL.mp3",
    pdf: "https://drive.google.com/file/d/17xfqsw_JCGfc8GDGVtKjJTKBY7nNDi23/preview"
  },

  {
    name: "9. Echo",
    id: "Martele-09",
    url: "https://kb-music.github.io/files/Martele-09_CL.mp3",
    pdf: "https://drive.google.com/file/d/1UBI-RZAtESIVJnhn_Cgjjic0qb2RdCsV/preview"
  },

  {
    name: "10. The Doll",
    id: "Martele-10",
    url: "https://kb-music.github.io/files/Martele-10_CL.mp3",
    pdf: "https://drive.google.com/file/d/1Ojg9kk3ky3vA8SdfKjKXbHEPK6k6-oXY/preview"
  }
]


// ===== TRACK VERSIONS HANDLER =====

function getTrackVersions(id) {
  const baseUrl = `https://kb-music.github.io/files/${id}`
  return {
    pn:   `${baseUrl}_PN.mp3`,
    pv1:  `${baseUrl}_V1.mp3`,
    pv2:  `${baseUrl}_V2.mp3`,
    dt:   `${baseUrl}_DT.mp3`,
    main: `${baseUrl}_CL.mp3`
  }
}

let current = 0
let speed = 1

// ===== FORMAT TIME =====
function format(t){
  if(!t||isNaN(t))return"00:00"
  let m=Math.floor(t/60), s=Math.floor(t%60)
  return String(m).padStart(2,"0")+":"+String(s).padStart(2,"0")
}

// ===== WAVEFORM =====
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height)
  if(!waveform.length) return
  let mid=canvas.height/2, step=Math.max(1, Math.floor(waveform.length/canvas.width))
  ctx.fillStyle="#3399ff"
  for(let i=0;i<canvas.width;i++){
    let min=1,max=-1
    for(let j=0;j<step;j++){
      let val=waveform[(i*step)+j]||0
      if(val<min) min=val
      if(val>max) max=val
    }
    ctx.fillRect(i,mid+(min*mid),1,(max-min)*mid)
  }

  if(loopA!=null && loopB!=null && audio.duration){
    let x1=(loopA/audio.duration)*canvas.width
    let x2=(loopB/audio.duration)*canvas.width
    ctx.fillStyle="rgba(255,180,80,0.25)"
    ctx.fillRect(x1,0,x2-x1,canvas.height)
  }

  if(loopA!=null && audio.duration){
    ctx.fillStyle="green"
    ctx.fillRect((loopA/audio.duration)*canvas.width,0,4,canvas.height)
  }

  if(loopB!=null && audio.duration){
    ctx.fillStyle="orange"
    ctx.fillRect((loopB/audio.duration)*canvas.width,0,4,canvas.height)
  }

  if(audio.duration){
    let x=(audio.currentTime/audio.duration)*canvas.width
    ctx.fillStyle="red"
    ctx.fillRect(x,0,2,canvas.height)
  }

  if(audio.duration){
    let playX = (audio.currentTime/audio.duration)*canvas.width
    ctx.fillStyle = "rgba(51,153,255,0.25)"
    ctx.fillRect(0,0,playX,canvas.height)
  }
}

// ===== DECODE AUDIO =====
function decode(url){
  fetch(url)
  .then(res=>res.arrayBuffer())
  .then(buf=>{
    let ac=new AudioContext()
    ac.decodeAudioData(buf, b=>{
      waveform = Array.from(b.getChannelData(0))
      draw()
    })
  })
}

// ===== LOAD TRACK =====
function loadTrack(i){
  current = i
  const t = tracks[i]
  audio.src = t.url
  audio.dataset.base = t.id
  audio.dataset.version = "main"

  trackName.textContent = `Piece Name: ${t.name}`
  pdfViewer.src = t.pdf
  setSpeed(1)
  loopA = loopB = null
  dragging = null
  decode(t.url)
  updatePlaylist()
audio.play().catch(err => {
  console.log("Autoplay blocked:", err)
})
  setActiveVersion("main")
updateVersionButtons()
}

function checkFileExists(url) {
  return fetch(url, { method: "HEAD" })
    .then(res => res.ok)
    .catch(() => false)
}

function updateVersionButtons() {
  const base = audio.dataset.base
  const versions = getTrackVersions(base)

  document.querySelectorAll("#trackVersions .versionButton").forEach(async btn => {
    const type = btn.dataset.type
    const url = versions[type]

    btn.classList.remove("disabled")

    if(!url) {
      btn.classList.add("disabled")
      return
    }

    const exists = await checkFileExists(url)

    if(!exists) {
      btn.classList.add("disabled")
    }
  })
}


// ===== SWITCH VERSION =====
function switchVersion(type){
  const base = audio.dataset.base
  const versions = getTrackVersions(base)  // <-- используем генератор
  if(!versions || !versions[type]) return   // если версии нет — выходим

  const url = versions[type]
  const currentTime = audio.currentTime
  const wasPlaying = !audio.paused

  audio.src = url
  audio.dataset.version = type

  // После загрузки аудио сохраняем позицию и скорость
  audio.addEventListener("loadedmetadata", ()=>{
    audio.currentTime = currentTime
    if(wasPlaying) audio.play()
    decode(url)               // обновляем waveform
  }, { once:true })

  setActiveVersion(type)      // подсвечиваем активную кнопку
}

// ===== SET ACTIVE BUTTON =====
function setActiveVersion(type){
  document.querySelectorAll("#trackVersions .versionButton").forEach(btn=>{
    btn.classList.remove("active")
  })
  const activeBtn = Array.from(document.querySelectorAll("#trackVersions .versionButton"))
    .find(btn => btn.dataset.type === type)
  if(activeBtn) activeBtn.classList.add("active")
}

// ===== PLAYLIST UI =====
function updatePlaylist(){
  playlist.innerHTML=""
  tracks.forEach((t,i)=>{
    let div=document.createElement("div")
    div.textContent = t.name
    div.classList.toggle("current", i===current)
    div.onclick=()=>loadTrack(i)
    playlist.appendChild(div)
  })
}

// ===== CONTROLS =====
play.onclick = ()=>audio.paused?audio.play():audio.pause()
audio.onplay = ()=>play.textContent="⏸"
audio.onpause = ()=>play.textContent="▶"
prev.onclick = ()=>loadTrack((current-1+tracks.length)%tracks.length)
next.onclick = ()=>loadTrack((current+1)%tracks.length)

// ===== SPEED =====
function setSpeed(v){
  speed = Math.max(0.5, Math.min(1.5, parseFloat(v)))
  audio.playbackRate = speed
  speedSlider.value = speed
  speedVal.textContent = speed.toFixed(2)
  let centerPercent = 50, percent
  if(speed>=1){
    percent = centerPercent + ((speed-1)/0.5)*50
    speedSlider.style.background = `linear-gradient(to right, #ccc ${centerPercent}%, #3399ff ${centerPercent}%, #3399ff ${percent}%, #ccc ${percent}%)`
  } else {
    percent = centerPercent - ((1-speed)/0.5)*50
    speedSlider.style.background = `linear-gradient(to right, #ccc ${percent}%, #3399ff ${percent}%, #3399ff ${centerPercent}%, #ccc ${centerPercent}%)`
  }
}
speedSlider.oninput = ()=>setSpeed(speedSlider.value)
slow.onclick = ()=>setSpeed(speed-0.01)
fast.onclick = ()=>setSpeed(speed+0.01)
reset.onclick = ()=>setSpeed(1)

// ===== VOLUME =====
function updateVolumeBg(){
  let val=parseFloat(volume.value)
  let max=parseFloat(volume.max)
  let percent=(val/max)*100
  volume.style.background=`linear-gradient(to right, #3399ff ${percent}%, #ccc ${percent}%)`
}
volume.oninput = ()=>{
  audio.volume = volume.value
  updateVolumeBg()
}
volume.value = 0.5
audio.volume = 0.5
updateVolumeBg()

// ===== WAVEFORM LOOP DRAG =====
canvas.onmousedown = e=>{
  if(!audio.duration) return
  let rect = canvas.getBoundingClientRect(), x = e.clientX - rect.left
  let t = (x / canvas.width) * audio.duration
  let ax = loopA!=null ? (loopA/audio.duration)*canvas.width : null
  let bx = loopB!=null ? (loopB/audio.duration)*canvas.width : null
  if(ax!==null && Math.abs(x-ax)<6) dragging="A"
  else if(bx!==null && Math.abs(x-bx)<6) dragging="B"
  else audio.currentTime = t
  draw()
}
canvas.onmousemove = e=>{
  if(!dragging || !audio.duration) return
  let rect = canvas.getBoundingClientRect()
  let t = ((e.clientX-rect.left)/canvas.width)*audio.duration
  if(dragging==="A"){ if(loopB!=null && t>loopB) t=loopB; loopA = Math.max(0,t) }
  else if(dragging==="B"){ if(loopA!=null && t<loopA) t=loopA; loopB = Math.min(audio.duration,t) }
  draw()
}
canvas.onmouseup = canvas.onmouseleave = ()=>dragging=null



// ===== AUDIO UPDATE =====
audio.ontimeupdate=()=>{
  time.textContent = format(audio.currentTime)+" / "+format(audio.duration)
  draw()
  if(loopA!=null && loopB!=null && audio.currentTime>=loopB) audio.currentTime=loopA
}

// ===== LOOP BUTTONS =====
loopAButton.onclick = ()=>{if(loopB!==null && audio.currentTime>loopB) return; loopA=audio.currentTime; draw()}
loopBButton.onclick = ()=>{if(loopA!==null && audio.currentTime<loopA) return; loopB=audio.currentTime; draw()}
loopCButton.onclick = ()=>{loopA=loopB=null; draw()}

// ===== AUTOPLAY NEXT TRACK =====
audio.onended = ()=>{loadTrack((current+1)%tracks.length)}

// ===== KEYBOARD =====
document.addEventListener("keydown", e=>{
  if(["ArrowLeft","ArrowRight","ArrowUp","ArrowDown"," "].includes(e.key)) e.preventDefault()
  switch(e.key){
    case " ": play.click(); break
    case "ArrowRight": audio.currentTime+=0.5; break
    case "ArrowLeft": audio.currentTime-=0.5; break
    case "ArrowUp": setSpeed(speed+0.01); break
    case "ArrowDown": setSpeed(speed-0.01); break
    case "a": if(loopB!==null && audio.currentTime>loopB) break; loopA=audio.currentTime; draw(); break
    case "b": if(loopA!==null && audio.currentTime<loopA) break; loopB=audio.currentTime; draw(); break
    case "c": loopA=loopB=null; draw(); break
  }
})

// ===== INIT =====
updatePlaylist()
loadTrack(0)
</script>
</body>
</html>
